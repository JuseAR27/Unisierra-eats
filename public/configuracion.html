<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Cuenta - UniSierra Eats</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" style="color: inherit;"><span class="logo-text">Uni<span class="highlight-orange">Sierra</span> Eats</span></a>
            </div>
            
            <div class="search-bar">
                <input type="text" placeholder="Buscar lonches, bebidas, snacks...">
                <button class="btn-search"><i class="fas fa-search"></i></button>
            </div>

            <div class="nav-actions">
                <a href="escribir_resena.html" class="btn-text">Escribir Reseña</a>
                <a href="perfil.html" class="btn-solid"><i class="fas fa-user-circle"></i> Mi Perfil</a>
            </div>
        </div>
    </header>

<main class="section-container settings-page" style="padding-top: 40px; padding-bottom: 40px;">
        <form id="configForm" class="admin-form" style="max-width: 500px; margin: 0 auto; background: var(--bg-card); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color);">
            <h2 style="margin-bottom: 20px; color: var(--primary-green); text-align: center;">Configuración de Cuenta</h2>
            
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="configNombre" required>
            </div>
            
            <div class="form-group">
                <label>Correo Institucional (No modificable)</label>
                <input type="email" id="configEmail" disabled style="background-color: rgba(255,255,255,0.05); cursor: not-allowed; color: #888;" title="Tu correo es tu identificador único y no puede cambiarse.">
            </div>
            
            <div class="form-group">
                <label>Nueva Contraseña (Opcional)</label>
                <input type="password" id="configPassword" placeholder="Escribe aquí solo si deseas cambiarla">
                <small style="color: var(--text-muted); display: block; margin-top: 5px; font-size: 0.85rem;">Déjalo en blanco para mantener tu contraseña actual.</small>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                <button type="button" id="btnEliminarCuenta" class="btn-outline" style="border-color: #d93025; color: #d93025; padding: 10px 15px; background: transparent;">
                    <i class="fas fa-trash"></i> Eliminar Cuenta
                </button>
                <button type="submit" class="btn-solid" style="padding: 10px 20px;">Guardar Cambios</button>
            </div>
        </form>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
